<!DOCTYPE html>
<html>
<head>
<title>Asteroid Destroyer</title>
<style>
  body {
    background: black;
    overflow: hidden;
  }

  #game {
    width: 400px;
    height: 600px;
    background: space;
    border: 2px solid white;
    position: relative;

  }

  #player {
    width: 40px;
    height: 40px;

    width: 40px;
    height: 40px;
    background: gray;
    position: absolute;
    top: 0;
  }
</style>
</head>
<body>

<div id="game">
  <div id="player"></div>
</div>

<script src="game.js"></script>
</body>
