<!DOCTYPE html>
<html>
<head>
<title>Asteroid Destroyer</title>

<style>

body{
    background:black;
    margin:0;
    overflow:hidden;
    font-family:Arial;
}

/* GAME AREA */
#game{
    width:400px;
    height:600px;
    border:3px solid white;
    margin:auto;
    position:relative;
    overflow:hidden;
    background:black;
}

/* UI */
#ui{
    color:white;
    text-align:center;
    font-size:20px;
    margin-top:10px;
}

/* PLAYER */
#player{
    position:absolute;
    bottom:20px;
    left:180px;
    font-size:36px;
}

/* STAR */
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
}

/* ASTEROID */
.asteroid{
    position:absolute;
    font-size:30px;
}

/* BULLET */
.bullet{
    position:absolute;
    font-size:20px;
}

/* EXPLOSION */
.explosion{
    position:absolute;
    font-size:40px;
}

/* START SCREEN */
#startScreen{
    position:absolute;
    width:100%;
    height:100%;
    background:black;
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-size:24px;
}

button{
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
}

</style>
</head>

<body>

<div id="ui">
Score: <span id="score">0</span> |
Lives: <span id="lives">3</span>
</div>

<div id="game">

<div id="startScreen">
🚀 Asteroid Destroyer<br><br>
<button onclick="startGame()">Start Game</button>
</div>

<div id="player">🚀</div>

</div>

<script>

const game = document.getElementById("game")
const player = document.getElementById("player")
const scoreText = document.getElementById("score")
const livesText = document.getElementById("lives")
const startScreen = document.getElementById("startScreen")

let playerX = 180
let score = 0
let lives = 3
let gameRunning = false
let asteroidSpeed = 4

/* START GAME */
function startGame(){
    startScreen.style.display="none"
    gameRunning = true
}

/* STARFIELD */
function createStar(){

if(!gameRunning) return

const star = document.createElement("div")
star.classList.add("star")

star.style.left = Math.random()*400+"px"
star.style.top = "0px"

game.appendChild(star)

let top = 0

const fall = setInterval(()=>{

top += 2
star.style.top = top+"px"

if(top > 600){
star.remove()
clearInterval(fall)
}

},30)

}

setInterval(createStar,100)

/* PLAYER MOVEMENT */
document.addEventListener("keydown",(e)=>{

if(!gameRunning) return

if(e.key === "ArrowLeft") playerX -= 25
if(e.key === "ArrowRight") playerX += 25
if(e.key === " ") shoot()

if(playerX < 0) playerX = 0
if(playerX > 360) playerX = 360

player.style.left = playerX+"px"

})

/* SHOOT */
function shoot(){

const bullet = document.createElement("div")
bullet.classList.add("bullet")
bullet.innerHTML = "🔺"

bullet.style.left = playerX+12+"px"
bullet.style.bottom = "60px"

game.appendChild(bullet)

let bottom = 60

const move = setInterval(()=>{

bottom += 8
bullet.style.bottom = bottom+"px"

if(bottom > 600){
bullet.remove()
clearInterval(move)
}

},20)

}

/* ASTEROIDS */
function createAsteroid(){

if(!gameRunning) return

const asteroid = document.createElement("div")
asteroid.classList.add("asteroid")
asteroid.innerHTML="☄️"

let x = Math.random()*360
asteroid.style.left = x+"px"

game.appendChild(asteroid)

let top = 0

const fall = setInterval(()=>{

top += asteroidSpeed
asteroid.style.top = top+"px"

const bullets = document.querySelectorAll(".bullet")

bullets.forEach(b=>{

const aRect = asteroid.getBoundingClientRect()
const bRect = b.getBoundingClientRect()

if(
aRect.bottom > bRect.top &&
aRect.top < bRect.bottom &&
aRect.left < bRect.right &&
aRect.right > bRect.left
){

explosion(aRect.left,aRect.top)

asteroid.remove()
b.remove()

score++
scoreText.innerText = score

clearInterval(fall)

}

})

/* PLAYER COLLISION */

let playerRect = player.getBoundingClientRect()
let asteroidRect = asteroid.getBoundingClientRect()

if(
asteroidRect.bottom > playerRect.top &&
asteroidRect.top < playerRect.bottom &&
asteroidRect.left < playerRect.right &&
asteroidRect.right > playerRect.left
){

explosion(asteroidRect.left,asteroidRect.top)

asteroid.remove()

lives--
livesText.innerText = lives

clearInterval(fall)

if(lives <=0){

setTimeout(()=>{
alert("💀 Game Over\nScore: "+score)
location.reload()
},300)

}

}

if(top > 600){

asteroid.remove()
clearInterval(fall)

}

},30)

}

setInterval(createAsteroid,1000)

/* EXPLOSION */
function explosion(x,y){

const boom = document.createElement("div")
boom.classList.add("explosion")
boom.innerHTML="💥"

boom.style.left = x+"px"
boom.style.top = y+"px"

game.appendChild(boom)

setTimeout(()=>{

boom.remove()

},400)

}

/* DIFFICULTY INCREASE */
setInterval(()=>{

asteroidSpeed += 0.3

},5000)

</script>

</body>
</html>
